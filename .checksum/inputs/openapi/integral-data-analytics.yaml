# Data Analytics API
openapi: 3.0.3

info:
  title: Data Analytics API
  description: |
    The Data Analytics API provides comprehensive insights into your trading operations by aggregating data across various crucial aspects of transactions. This API serves as a powerful tool to retrieve and analyze data related to trades, orders, positions, profits, and other pivotal metrics.
  license:
    name: Integral
    url: "https://integral.com"
  version: 1.0.0

servers:
  - url: https://top10.sca.dc.integral.net/v2/data/analytics
    description: Production server (HTTPS)
  - url: http://cqtop10-03.sca.dc.integral.net:8099/data/analytics
    description: Development server
  - url: http://localhost:8080/data/analytics
    description: Local server
  - url: http://cqapp01.sca.dc.integral.net:8099/data/analytics
    description: Backup development server

security:
  - jwtTokenAuth: []
  - apiKeyAuth: []

tags:
  - name: Trade Data
    description: Endpoints related to trade data
  - name: Order Data
    description: Endpoints related to order data
  - name: RFS Data
    description: Endpoints related to rfs data
  - name: Authentication
    description: Operations for authentication

paths:
  /trades/volume:
    post:
      operationId: tradesVolume
      summary: Trade volume
      description: This endpoint enables you to retrieve aggregated trade volume data based on specified filters and grouping criteria.
      tags:
        - Trade Data
      requestBody:
        $ref: '#/components/requestBodies/TradeVolumeRequestBody'
      responses:
        '200':
          description: An array of TradeVolume objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeVolumeResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.
  /trades/stats:
    post:
      operationId: tradesStats
      summary: Trade statistics (aggregated)
      description: This endpoint enables you to retrieve aggregated trade activities based on specified filters and grouping criteria.
      tags:
        - Trade Data
      requestBody:
        $ref: '#/components/requestBodies/TradeStatsRequestBody'
      responses:
        '200':
          description: Trade stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeStatsResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.

  /trades/compare:
    post:
      operationId: tradesCompare
      summary: Trade data comparison
      description: This endpoint facilitates the comparison of aggregated trade data between two distinct time periods based on specified filters and grouping criteria.
      tags:
        - Trade Data
      requestBody:
        $ref: '#/components/requestBodies/TradeCompareRequestBody'
      responses:
        '200':
          description: Trade compare
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeCompareResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.

  /trades/positions/ccypair:
    post:
      operationId: tradesPositionsCcyPair
      summary: Positions by currency pair
      description: This endpoint offers a comprehensive Positions-Currency Pair (CcyPair) report that provides insights into positions held within specific currency pairs based on specified filters and grouping criteria.
      tags:
        - Trade Data
      requestBody:
        $ref: '#/components/requestBodies/TradePositionsRequestBody'
      responses:
        '200':
          description: Positions by currency pair data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionsCcyPairResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.

  /trades/positions/ccy:
    post:
      operationId: tradesPositionsCcy
      summary: Positions by currency
      description: The endpoint offers a comprehensive overview of currency settlements, shedding light on the specific currency amounts slated for settlement based on specified filters and grouping criteria.
      tags:
        - Trade Data
      requestBody:
        $ref: '#/components/requestBodies/TradeSettlementsRequestBody'
      responses:
        '200':
          description: Currency settlement data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionsCcyResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.

  /trades/profit/cover:
    post:
      operationId: tradesProfitCover
      summary: Profit by cover trades
      description: The endpoint offers a specialized report that highlights the profitability achieved through cover trades based on specified filters and grouping criteria.
      tags:
        - Trade Data
      requestBody:
        $ref: '#/components/requestBodies/ProfitCoverRequestBody'
      responses:
        '200':
          description: Cover trade data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.

  /trades/profit/sales:
    post:
      operationId: tradesProfitSales
      summary: Profit by sales spreads
      description: The endpoint offers a report that highlights the profits achieved through the addition of spreads during the price provisioning process based on specified filters and grouping criteria.
      tags:
        - Trade Data
      requestBody:
        $ref: '#/components/requestBodies/ProfitSalesRequestBody'
      responses:
        '200':
          description: Spread profit data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.

  /trades/profit/spreads:
    post:
      operationId: tradesProfitSpreads
      summary: Profit by All spreads
      description: This endpoint generates a detailed Profit-Spreads report that highlights the profitability derived from All spreads defined within the system.
      tags:
        - Trade Data
      requestBody:
        $ref: '#/components/requestBodies/ProfitSpreadsRequestBody'
      responses:
        '200':
          description: Profit from spreads data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfitSpreadsResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.
  /trades/details:
    post:
      operationId: tradesDetails
      summary: Details of All trades
      description: This endpoint generates a detailed report of  all trades Done in the system.
      tags:
        - Trade Data
      requestBody:
        $ref: '#/components/requestBodies/TradeDetailsRequestBody'
      responses:
        '200':
          description: Details of trades Done
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeDetailsResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.

  /trades/{id}:
    get:
      operationId: tradesId
      summary: Trade tickets
      description: This endpoint provides access to individual trade deal tickets based on the transaction ID (ID) specified in the URL.
      parameters:
        - name: id
          in: path
          description: ID of trade to return
          required: true
          schema:
            type: string
      tags:
        - Trade Data
      responses:
        '200':
          description: Trade ticket data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeTicketResponseBody'
        '401':
          description: Unauthorized.
          
  /orders/{id}:
    get:
      operationId: ordersId
      summary: Order tickets
      description: This endpoint provides access to individual order tickets based on the order id (ID) specified in the URL.
      parameters:
        - name: id
          in: path
          description: ID of order to return
          required: true
          schema:
            type: string
      tags:
        - Order Data
      responses:
        '200':
          description: Order ticket data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderTicketResponseBody"
        '401':
          description: Unauthorized.
          
  /orders/customer/{id}:
    get:
      operationId: ordersCustomerId
      summary: Order customer tickets
      description: This endpoint provides access to individual customer order tickets based on the order id (ID) specified in the URL.
      parameters:
        - name: id
          in: path
          description: ID of order to return
          required: true
          schema:
            type: string
      tags:
        - Order Data
      responses:
        '200':
          description: Order ticket data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderTicketResponseBody"
        '401':
          description: Unauthorized.

  /orders/volume:
    post:
      operationId: ordersVolume
      summary: Order volume
      description: This endpoint enables you to retrieve aggregated order volume data based on specified filters and grouping criteria.
      tags:
        - Order Data
      requestBody:
        $ref: '#/components/requestBodies/OrdersVolumeRequestBody'
      responses:
        '200':
          description: Order volume data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersVolumeResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.

  /rfs/volume:
    post:
      operationId: rfsVolume
      summary: RFS volume
      description: This endpoint enables you to retrieve aggregated volume data for RFS based on specified filters and grouping criteria.
      tags:
        - RFS Data
      requestBody:
        $ref: '#/components/requestBodies/RFSVolumeRequestBody'
      responses:
        '200':
          description: RFS volume data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersVolumeResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.

  /orders/stats:
    post:
      operationId: ordersStats
      summary: Order statistics
      description: This endpoint enables you to retrieve aggregated order activities based on specified filters and grouping criteria.
      tags:
        - Order Data
      requestBody:
        $ref: '#/components/requestBodies/OrdersStatisticsRequestBody'
      responses:
        '200':
          description: Order statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersStatsResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.

  /rfs/stats:
    post:
      operationId: rfsStats
      summary: RFS stats
      description: This endpoint enables you to retrieve aggregated statistics data for RFS based on specified filters and grouping criteria.
      tags:
        - RFS Data
      requestBody:
        $ref: '#/components/requestBodies/RFSVolumeRequestBody'
      responses:
        '200':
          description: RFS stats data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersStatsResponseBody'
        '400':
          description: Bad Request.
        '404':
          description: Not Found.
        '405':
          description: Method Not Allowed.
        '401':
          description: Unauthorized.

  /authenticate:
    post:
      operationId: authenticate
      summary: Authentication
      description: This endpoint facilitates user authentication with the data API.
      tags:
        - Authentication
      requestBody:
        $ref: '#/components/requestBodies/AuthRequestBody'
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
          
components:
  schemas:
    TradeGroupByRequest:
      type: object
      properties:
        groupBy:
          type: array
          description: >
            The list of grouping fields to aggregate trade data by.
              - Cpty: Counterparty
              - CptyLongName: Counterparty Long Name
              - CptyAccount: Counterparty Account
              - CptyDealer: Counterparty Dealer
              - CptyRegion: Counterparty Region
              - CptyCountry: Counterparty Country
              - Account: Account
              - PortfolioID: Portfolio ID
              - LEI: Legal Entity Identifier
              - ClientTag: Client Tag
              - Dealer: Dealer
              - CcyPair: Currency Pair
              - CoveredCpty: Covered Counterparty
              - PrimeBroker: Prime Broker
              - PBAccount: Prime Broker Account
              - MkrTkr: Maker/Taker
              - Date: Date
              - Week: Week
              - Month: Month
              - Quarter: Quarter
              - Channel-WorkflowType: Channel Workflow Type
              - Stream: Stream
              - TrdType: Trade Type
              - Book: Book
              - None: None
          items:
            type: string
            enum:
              - Cpty
              - CptyLongName
              - CptyAccount
              - CptyDealer
              - CptyRegion
              - CptyCountry
              - Account
              - PortfolioID
              - LEI
              - ClientTag
              - Dealer
              - CcyPair
              - CoveredCpty
              - PrimeBroker
              - PBAccount
              - MkrTkr
              - Date
              - Week
              - Month
              - Quarter
              - Channel-WorkflowType
              - Stream
              - TrdType
              - Book
              - None
          minItems: 1
          maxItems: 3
    TradeDetailsGroupByRequest:
      type: object
      properties:
        groupBy:
          type: array
          description: >
            The list of grouping fields to aggregate trade data by.
              - Cpty: Counterparty
              - CptyLongName: Counterparty Long Name
              - CptyAccount: Counterparty Account
              - CptyDealer: Counterparty Dealer
              - CptyRegion: Counterparty Region
              - CptyCountry: Counterparty Country
              - Account: Account
              - PortfolioID: Portfolio ID
              - LEI: Legal Entity Identifier
              - ClientTag: Client Tag
              - Dealer: Dealer
              - CcyPair: Currency Pair
              - CoveredCpty: Covered Counterparty
              - PrimeBroker: Prime Broker
              - PBAccount: Prime Broker Account
              - MkrTkr: Maker/Taker
              - Date: Date
              - Week: Week
              - Month: Month
              - Quarter: Quarter
              - Channel-WorkflowType: Channel Workflow Type
              - Stream: Stream
              - TrdType: Trade Type
              - Book: Book
              - None: None
          items:
            type: string
            enum:
              - Cpty
              - CptyLongName
              - CptyAccount
              - CptyDealer
              - CptyRegion
              - CptyCountry
              - Account
              - PortfolioID
              - LEI
              - ClientTag
              - Dealer
              - CcyPair
              - CoveredCpty
              - PrimeBroker
              - PBAccount
              - MkrTkr
              - Date
              - Week
              - Month
              - Quarter
              - Channel-WorkflowType
              - Stream
              - TrdType
              - Book
              - None
          minItems: 1
          maxItems: 2
    TradeProfitGroupByRequest:
      type: object
      properties:
        groupBy:
          type: array
          description: >
            The list of grouping fields to aggregate trade data by.
              - Cpty: Counterparty
              - CptyLongName: Counterparty Long Name
              - CptyAccount: Counterparty Account
              - CptyDealer: Counterparty Dealer
              - Account: Account
              - PortfolioID: Portfolio ID
              - ClientTag: Client Tag
              - Dealer: Dealer
              - CcyPair: Currency Pair
              - CoveredCpty: Covered Counterparty
              - MkrTkr: Maker/Taker
              - Date: Date
              - Week: Week
              - Month: Month
              - Channel-WorkflowType: Channel Workflow Type
              - Stream: Stream
              - TrdType: Trade Type
              - Book: Book
              - ValueDate: Value Date
              - None: None
          items:
            type: string
            enum:
              - Cpty
              - CptyLongName
              - CptyAccount
              - CptyDealer
              - Account
              - PortfolioID
              - ClientTag
              - Dealer
              - CcyPair
              - CoveredCpty
              - MkrTkr
              - Date
              - Week
              - Month
              - Channel-WorkflowType
              - Stream
              - TrdType
              - Book
              - ValueDate
              - None
          minItems: 1
          maxItems: 3
    
    TradeCompareGroupByRequest:
      type: object
      properties:
        groupBy:
          type: array
          description: >
            The list of grouping fields to aggregate trade data by.
              - Cpty: Counterparty
              - CptyLongName: Counterparty Long Name
              - CptyAccount: Counterparty Account
              - Account: Account
              - Dealer: Dealer
              - CcyPair: Currency Pair
              - MkrTkr: Maker/Taker
              - Channel-WorkflowType: Channel Workflow Type
              - Stream: Stream
              - TrdType: Trade Type
              - None: None
          items:
            type: string
            enum:
              - Cpty
              - CptyLongName
              - CptyAccount
              - Account
              - Dealer
              - CcyPair
              - MkrTkr
              - Channel-WorkflowType
              - Stream
              - TrdType
              - None
          minItems: 1
          maxItems: 3
    
    TradeSettlementGroupByRequest:
      type: object
      properties:
        groupBy:
          type: array
          description: >
            The list of grouping fields to aggregate trade data by.
              - Cpty: Counterparty
              - CptyLongName: Counterparty Long Name
              - CptyAccount: Counterparty Account
              - Account: Account
              - PortfolioID: Portfolio ID
              - ClientTag: Client Tag
              - Dealer: Dealer
              - Ccy: Currency
              - PrimeBroker: Prime Broker
              - PBAccount: Prime Broker Account
              - MkrTkr: Maker/Taker
              - Date: Date
              - Channel: Channel
              - Channel-WorkflowType: Channel Workflow Type
              - TrdType: Trade Type
              - None: None
          items:
            type: string
            enum:
              - Cpty
              - CptyLongName
              - CptyAccount
              - Account
              - PortfolioID
              - ClientTag
              - Dealer
              - Ccy
              - PrimeBroker
              - PBAccount
              - MkrTkr
              - Date
              - Channel
              - Channel-WorkflowType
              - TrdType
              - None
          minItems: 1
          maxItems: 3

    TradePositionsGroupByRequest:
      type: object
      properties:
        groupBy:
          type: array
          description: >
            The list of grouping fields to aggregate trade data by.
              - Cpty: Counterparty
              - CptyLongName: Counterparty Long Name
              - CptyAccount: Counterparty Account
              - Account: Account
              - PortfolioID: Portfolio ID
              - ClientTag: Client Tag
              - Dealer: Dealer
              - CcyPair: Currency Pair
              - PrimeBroker: Prime Broker
              - PBAccount: Prime Broker Account
              - MkrTkr: Maker/Taker
              - Date: Date
              - Channel: Channel
              - Channel-WorkflowType: Channel Workflow Type
              - TrdType: Trade Type
              - None: None
          items:
            type: string
            enum:
              - Cpty
              - CptyLongName
              - CptyAccount
              - Account
              - PortfolioID
              - ClientTag
              - Dealer
              - CcyPair
              - PrimeBroker
              - PBAccount
              - MkrTkr
              - Date
              - Channel
              - Channel-WorkflowType
              - TrdType
              - None
          minItems: 1
          maxItems: 3
    
    OrderGroupByRequest:
      type: object
      properties:
        groupBy:
          type: array
          description: >
            The list of grouping fields to aggregate trade data by.
              - Org: Organization
              - Account: Account
              - OrgLongName: Org Name
              - PortfolioID: Portfolio ID
              - LEI: Legal Entity Identifier
              - Dealer: Dealer
              - CcyPair: Currency Pair
              - Date: Date
              - Week: Week
              - Month: Month
              - Quarter: Quarter
              - Contingency: Contingency
              - Channel-WorkflowType: Channel Workflow Type
              - TrdType: Trade Type
              - OrderType: OrderType
              - Strategy: Strategy
              - OrderState: OrderState
              - OrderTIF: OrderTIF
              - None: None
          items:
            type: string
            enum:
              - Org
              - Account
              - OrgLongName
              - PortfolioID
              - LEI
              - Dealer
              - CcyPair
              - Date
              - Week
              - Month
              - Quarter
              - Contingency
              - Channel-WorkflowType
              - TrdType
              - OrderType
              - Strategy
              - OrderState
              - OrderTIF
              - None
          minItems: 1
          maxItems: 3
    
    BaseRequest:
      type: object
      properties:
        organizations:
          type: array
          description: >
            (i) A list of organization names to filter the trade data. 
            Each organization name should be a string that matches the following criteria:
              - Minimum length: 1 character
              - Maximum length: 500 characters
              - Allowed characters: Alphanumeric characters, commas, and asterisks.
            
            If not specified, the default value is ["All"], which includes All organizations.
          items:
            type: string
            minLength: 1
            maxLength: 500
            pattern: ^[a-zA-Z0-9+,*]+$
          default: ["All"]
        tradeTypes:
          type: array
          description: >
            The types of trades to filter by. The available trade types include:
              - **spot**: Spot trades
              - **outright**: Outright trades
              - **NDF**: Non-Deliverable Forward trades
              - **swap**: Swap trades
              - **SSP**: Same-Day Spot trades
              - **All**: All types of trades
        
            If not specified, the default value is ["All"].
          items:
            type: string
            enum:
              - spot
              - outright
              - NDF
              - swap
              - SSP
              - All
          default: ['spot']
        tradeLegs:
          type: array
          description: >
            The types of legs to filter by. The available trade legs include:
              - **near**: Near leg of the trade
              - **far**: Far leg of the trade
              - **All**: All legs of the trade
        
            If not specified, the default value is ["All"].
          items:
            type: string
            enum:
              - near
              - far
              - All
          default: ['All']
        symbols:
          type: array
          description: >
            The names of the instrument/currency pair to filter trade data by. 
             >
            Each symbol should match the following criteria:
              - Minimum length: 2 characters
              - Maximum length: 500 characters
              - Allowed characters: Alphanumeric characters, commas, and asterisks.
        
            If not specified, the default value is ["All"], which includes All symbols.
          items:
            type: string
            minLength: 2
            maxLength: 500
            pattern: ^[a-zA-Z0-9+,*]+$
          default: ["All"]
        channelProducts:
          type: array
          description: >
            (i) Filter trades based on the channel product.
             > 
            Each channel product should match the following criteria:
              - Minimum length: 1 character
              - Maximum length: 50 characters
              - Allowed characters: Alphanumeric characters, commas, and asterisks.
        
            If not specified, the default value is ["All"], which includes All channel products.
          items:
            type: string
            minLength: 1
            maxLength: 50
            pattern: ^[a-zA-Z0-9+,*]+$
          default: ["All"]
        channelWorkflows:
          type: array
          description: >
            Filter trades based on the channel workflow.
             > 
            Each channel workflow should match the following criteria:
              - Minimum length: 1 character
              - Maximum length: 50 characters
              - Allowed characters: Alphanumeric characters, commas, and asterisks.
        
            If not specified, the default value is ["All"], which includes All channel workflows.
          items:
            type: string
            minLength: 1
            maxLength: 50
            pattern: ^[a-zA-Z0-9+,*]+$
          default: ["All"]
        channelComponents:
          type: array
          description: >
            (i) Filter trades based on the channel component.
             > 
            Each channel component should match the following criteria:
              - Minimum length: 1 character
              - Maximum length: 50 characters
              - Allowed characters: Alphanumeric characters, commas, and asterisks.
        
            If not specified, the default value is ["All"], which includes All channel components.
          items:
            type: string
            minLength: 1
            maxLength: 50
            pattern: ^[a-zA-Z0-9+,*]+$
          default: ["All"]
        internalGroup:
          type: array
          description: >
            (i) The names of the Organization Group to filter trade data by.
             > 
            Each group name should match the following criteria:
              - Minimum length: 1 character
              - Maximum length: 500 characters
              - Allowed characters: Alphanumeric characters, commas, and asterisks.
        
            If not specified, the default value is ["All"], which includes All organization groups.
          items:
            type: string
            minLength: 1
            maxLength: 500
            pattern: ^[a-zA-Z0-9+,*]+$
          default: ["All"]
        isOrganizationGroup:
          type: boolean
          description: >
            (i) Include organizational group trades in the results.
             >
            This field is a boolean and can either be true or false.
            If not specified, the default value is false.
          default: false
        startDate:
          type: string
          description: >
            Filter trades based on the start date.
             > 
            The date should be in the format dd-MMM-yyyy, e.g., 01-Jan-2020.
            The minimum and maximum length of the date string is 11 characters.
          minLength: 11
          maxLength: 11

        endDate:
          type: string
          description: >
            Filter trades based on the end date.
             >
            The date should be in the format dd-MMM-yyyy, e.g., 01-Jan-2020.
            The minimum and maximum length of the date string is 11 characters.
          minLength: 11
          maxLength: 11
      required:
        - groupBy
        - startDate
        - endDate
        
    TradeRequest:
      allOf:
        - $ref: '#/components/schemas/TradeGroupByRequest'

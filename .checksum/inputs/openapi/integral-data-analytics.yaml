             > 
            The format should be `Top|Bottom:Count:Field`, where:
              - **Top** or **Bottom** specifies the sorting order.
              - **Count** specifies the number of results to return (use "All" to include All results).
              - **Field** specifies the field to sort and filter by. 
        
            Example: `Top:10:TradeVolume` sorts by the top 10 results based on trade volume.
        
            The available fields for sorting and filtering include:
              - **TradeVolume**: Volume of trades
              - **AvgTrdSize**: Average trade size
              - **DoneTrades**: Completed trades
              - **RejectedTrades**: Rejected trades
              - **PercentRejectedTrades**: Percentage of rejected trades
        
            If not specified, the default value is "Top:All:TradeVolume".
          pattern: ^(Top|Bottom):((All)|[0-9]+):(TradeVolume|AvgTrdSize|DoneTrades|RejectedTrades|PercentRejectedTrades)$
          default: "Top:All:TradeVolume"
        
        organizationRegions:
          type: string
          description: >
            (i) Filter trades based on the organization region.
             > 
            The available regions include:
              - **All**: All regions
              - **America**: Americas region
              - **Asia-Pacific**: Asia-Pacific region
              - **EMEA**: Europe, Middle East, and Africa region
        
            If not specified, the default value is "All", which includes All regions.
          enum:
            - All
            - America
            - Asia-Pacific
            - EMEA
          default: "All"
        
        organizationCountries:
          type: string
          description: >
            (i) Filter trades based on the organization country.
             > 
            Each country should match the following criteria:
              - Minimum length: 2 characters
              - Maximum length: 50 characters
              - Allowed characters: Alphabetic characters, separated by commas.
        
            If not specified, the default value is "All", which includes All countries.
          minLength: 2
          maxLength: 50
          pattern: ^[a-zA-Z]+(?:,[a-zA-Z]+)*$
          default: "All"
        
        organizationSegments:
          type: string
          description: >
            (i) Filter trades based on the organization segment.
             > 
            The available segments include:
              - **All**: All segments
              - **Institution**: Institutional segment
              - **Margin FX**: Margin FX segment
              - **Asset Manager**: Asset Manager segment
              - **Bank**: Banking segment
        
            If not specified, the default value is "All", which includes All segments.
          enum:
            - All
            - Institution
            - Margin FX
            - Asset Manager
            - Bank
          default: "All"
        
        counterparties:
          type: array
          description: >
            The names of the counterparties to filter trade data by.
             > 
            Each counterparty name should match the following criteria:
              - Minimum length: 1 character
              - Maximum length: 500 characters
              - Allowed characters: Alphanumeric characters, commas, and asterisks.
        
            If not specified, the default value is ["All"], which includes All counterparties.
          items:
            type: string
            minLength: 1
            maxLength: 500
            pattern: ^[a-zA-Z0-9+,*]+$
          default: ["All"]
        
        tradeSide:
          type: string
          description: >
            Filter trades based on the maker or taker side.
             > 
            The available sides include:
              - **All**: All trades
              - **Maker**: Maker trades
              - **Taker**: Taker trades
        
            If not specified, the default value is "All", which includes both maker and taker trades.
          enum:
            - All
            - Maker
            - Taker
          default: "All"

      required:
        - compareToStartDate
        - compareToEndDate

